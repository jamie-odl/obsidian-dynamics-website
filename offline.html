<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Dynamics — Temporarily offline</title>
    <meta name="description" content="Obsidian Dynamics is temporarily offline. Enquiries: jamie@obsidiandynamics.co.uk">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="theme-color" content="#0c4a4e">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <style>
        :root {
            --porcelain: #f4f7f8;
            --charcoal: #1a222c;
            --slate: #5c6b7a;
            --harbor: #0c4a4e;
            --harbor-mid: #147a82;
            --mist: #e8eef0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { min-height: 100%; }
        body {
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--charcoal);
            background:
                radial-gradient(ellipse 90% 60% at 10% 0%, rgba(20, 122, 130, 0.12), transparent 55%),
                radial-gradient(ellipse 70% 50% at 100% 100%, rgba(12, 74, 78, 0.10), transparent 50%),
                linear-gradient(165deg, var(--porcelain) 0%, var(--mist) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }
        main {
            width: min(36rem, 100%);
            text-align: left;
        }
        .brand {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--harbor);
            margin-bottom: 1.75rem;
        }
        .brand span { color: var(--harbor-mid); }
        h1 {
            font-size: clamp(1.85rem, 4.5vw, 2.45rem);
            font-weight: 650;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin-bottom: 0.85rem;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.65;
            color: var(--slate);
            max-width: 32rem;
        }
        p + p { margin-top: 0.75rem; }
        a {
            color: var(--harbor);
            text-decoration-thickness: 1px;
            text-underline-offset: 0.15em;
        }
        a:hover { color: var(--harbor-mid); }
        .rule {
            width: 3rem;
            height: 2px;
            background: var(--harbor-mid);
            margin: 1.5rem 0;
            border: 0;
        }
    </style>
</head>
<body>
    <main>
        <p class="brand">Obsidian <span>Dynamics</span></p>
        <h1>This site is temporarily offline</h1>
        <hr class="rule">
        <p>The public marketing site is not available right now. Existing product and admin access is unchanged.</p>
        <p>Enquiries: <a href="mailto:jamie@obsidiandynamics.co.uk">jamie@obsidiandynamics.co.uk</a></p>
    </main>
</body>
</html>
