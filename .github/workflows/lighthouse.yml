name: Lighthouse

on:
  pull_request:
    paths:
      - "**/*.html"
      - "css/**"
      - "js/**"
      - "img/**"
      - "fonts/**"
      - "vercel.json"
      - ".github/workflows/lighthouse.yml"
      - ".lighthouserc.json"

permissions:
  contents: read
  pull-requests: write

jobs:
  lhci:
    name: Lighthouse CI
    runs-on: [self-hosted, linux, obsidian]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
