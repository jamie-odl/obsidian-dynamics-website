<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Obsidian Dynamics</title>
    <meta name="description" content="Contact Obsidian Dynamics Limited — developer contributions intelligence, journalist enquiries, and workspace access.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://obsidiandynamics.co.uk/contact">
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<a href="#main-content" class="skip-to-content">Skip to content</a>
<canvas id="particleCanvas" aria-hidden="true"></canvas>
<nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo"><span class="logo-text">OBSIDIAN <span class="logo-accent">DYNAMICS</span></span></a><div class="nav-links" id="navLinks"></div><button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false"><span></span><span></span><span></span></button></div></nav>
<main id="main-content">
    <section class="page-hero page-hero--contact"><p class="page-hero__badge">CONTACT</p><h1 class="page-hero__title">Get in touch.</h1><p class="page-hero__subtitle">Journalist enquiries, workspace access, API questions, or a general message — say what you need and we will reply from jamie@obsidiandynamics.co.uk.</p></section>
    <section class="contact-section" style="padding-top:0;"><div class="container container--narrow">
        <div class="contact-form-wrapper">
            <form class="contact-form" id="contactForm" novalidate>
                <div class="form-group visually-hidden" aria-hidden="true">
                    <label for="company_website">Company website</label>
                    <input type="text" id="company_website" name="company_website" class="form-input" tabindex="-1" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="interest" class="form-label">Topic</label>
                    <select id="interest" name="interest" class="form-input form-select">
                        <option value="">Choose one (optional)</option>
                        <option value="journalist">Journalist enquiry</option>
                        <option value="access">Workspace access</option>
                        <option value="api">Developer API</option>
                        <option value="general">General enquiry</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-input form-textarea" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Send</button>
                <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
            </form>
            <p class="footer-company-info" style="margin-top:1.25rem; text-align:center;"><button type="button" class="btn btn-ghost email-reveal-btn" id="emailRevealBtn">Reveal email</button></p>
        </div>
    </div></section>
</main>
<footer class="footer" role="contentinfo"><div class="container"></div></footer>
<script src="js/main.js" defer></script>
</body>
</html>
