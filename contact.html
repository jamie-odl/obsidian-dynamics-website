<body>
<a href="#main-content" class="skip-to-content">Skip to main content</a>
<canvas id="particleCanvas" aria-hidden="true"></canvas>
<nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo"><span class="logo-text">OBSIDIAN <span class="logo-accent">DYNAMICS</span></span></a><div class="nav-links" id="navLinks"></div><button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false"><span></span><span></span><span></span></button></div></nav>
<main id="main-content">
    <section class="page-hero page-hero--contact"><p class="page-hero__badge">CONTACT</p><h1 class="page-hero__title">Say what you need to monitor.</h1><p class="page-hero__subtitle">Tell us about the site, what you need to measure — noise, vibration, seismic — and the limits that apply. We reply from a real inbox, not a ticket queue.</p></section>
    <section class="contact-section" style="padding-top:0;"><div class="container container--narrow">
        <div class="contact-form-wrapper">
            <form class="contact-form" id="contactForm" novalidate>
                <div class="form-group visually-hidden" aria-hidden="true">
                    <label for="company_website">Company website</label>
                    <input type="text" id="company_website" name="company_website" class="form-input" tabindex="-1" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-input" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="interest" class="form-label">Interest</label>
                    <select id="interest" name="interest" class="form-input form-select">
                        <option value="">What can we help with?</option>
                        <option value="node">The Mk.II Node</option>
                        <option value="deployment">A site deployment</option>
                        <option value="platform">Platform / API</option>
                        <option value="onboarding">Onboarding</option>
                        <option value="account-operations">Account operations</option>
                        <option value="general">General</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" name="message" class="form-input form-textarea" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Send</button>
                <div id="formStatus" class="form-status" role="status" aria-live="polite"></div>
            </form>
            <p class="footer-company-info" style="margin-top:1.25rem; text-align:center;"><button type="button" class="btn btn-ghost email-reveal-btn" id="emailRevealBtn">Reveal email</button></p>
        </div>
    </div></section>
</main>
