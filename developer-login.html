<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Login | Obsidian Dynamics</title>
    <meta name="description" content="Secure developer portal login with allowlisted access and email-link two-factor verification.">
    <link rel="canonical" href="https://obsidiandynamics.co.uk/developer-login">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<a href="#main-content" class="skip-to-content">Skip to main content</a>
<canvas id="particleCanvas" aria-hidden="true"></canvas>
<nav class="navbar" id="navbar"><div class="nav-container"><a href="index.html" class="nav-logo"><span class="logo-text">OBSIDIAN <span class="logo-accent">DYNAMICS</span></span></a><div class="nav-links" id="navLinks"></div><button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false"><span></span><span></span><span></span></button></div></nav>
<main id="main-content">
    <section class="page-hero">
        <div class="hero-grid-overlay"></div>
        <div class="page-hero__badge">DEVELOPER ACCESS</div>
        <h1 class="page-hero__title">Secure sign-in with <span class="gradient-text">email-link 2FA</span></h1>
        <p class="page-hero__subtitle">Access to developer surfaces is restricted to allowlisted accounts and requires one-time email-link verification.</p>
    </section>

    <section class="contact-section" style="padding-top:0;">
        <div class="container container--narrow">
            <div class="contact-form-wrapper">
                <h2>Request secure login link</h2>
                <form id="developerLoginForm" class="contact-form" novalidate>
                    <div class="form-group">
                        <label for="developerEmail" class="form-label">Allowlisted email</label>
                        <input id="developerEmail" name="email" type="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-full">Send login link</button>
                    <div id="developerLoginStatus" class="form-status" role="status" aria-live="polite"></div>
                </form>
            </div>
        </div>
    </section>
</main>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    var form = document.getElementById('developerLoginForm');
    var status = document.getElementById('developerLoginStatus');
    if (!form || !status) return;

    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        status.className = 'form-status';
        status.textContent = '';
        var emailInput = document.getElementById('developerEmail');
        var email = (emailInput && emailInput.value ? emailInput.value : '').trim();
        if (!email) return;

        var params = new URLSearchParams(window.location.search);
        var next = params.get('next') || 'developer-central.html';

        try {
            var response = await fetch('/api/auth/request-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, next: next })
            });
            if (response.status === 403) {
                window.location.href = 'access-denied.html';
                return;
            }
            if (!response.ok) throw new Error('Request failed');
            status.className = 'form-status form-status--success';
            status.textContent = 'Login link sent. Check your email to complete 2FA sign-in.';
        } catch (error) {
            status.className = 'form-status form-status--error';
            status.textContent = 'Unable to send login link. Verify allowlist access or contact operations.';
        }
    });
});
</script>
</body>
</html>
